version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  api:
    build: .
    command: python -m uvicorn parkinson_ai.api.app:app --host 0.0.0.0 --port 8000
    volumes:
      - ./:/app
    working_dir: /app
    depends_on:
      - ollama
    ports:
      - "8000:8000"

volumes:
  ollama-data: {}
